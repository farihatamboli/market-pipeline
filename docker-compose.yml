services:

  # TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB:       marketdata
      POSTGRES_USER:     mdp
      POSTGRES_PASSWORD: mdp_secret
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdp -d marketdata"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Web Dashboard
  dashboard:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5050:5050"
    environment:
      PORT:                5050
      TIMESCALE_URL:       postgresql://mdp:mdp_secret@db:5432/marketdata
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      SLACK_WEBHOOK_URL:   ${SLACK_WEBHOOK_URL:-}
    command: >
      gunicorn "dashboard.app:app"
        --bind 0.0.0.0:5050
        --worker-class gthread
        --workers 1
        --threads 4
        --timeout 120

  # Streamlit Research Dashboard
  research:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8501:8501"
    environment:
      TIMESCALE_URL: postgresql://mdp:mdp_secret@db:5432/marketdata
    command: streamlit run streamlit_app/app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  timescale_data:
